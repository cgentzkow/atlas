<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atlas — Retailer Map Maker</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  <style>
    :root { color-scheme: light; }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #111827;
      color: #f3f4f6;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    #header {
      background: #1f2937;
      padding: 10px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      border-bottom: 1px solid #374151;
      flex-shrink: 0;
    }
    #header h1 { font-size: 16px; font-weight: 700; color: #f9fafb; letter-spacing: -0.3px; }
    #header .subtitle { font-size: 12px; color: #6b7280; }

    /* ── Control Bar ── */
    #controls {
      background: #1f2937;
      padding: 10px 18px;
      display: flex;
      gap: 10px;
      align-items: center;
      border-bottom: 1px solid #374151;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .ctrl-group { display: flex; flex-direction: column; gap: 3px; }
    .ctrl-label { font-size: 10px; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.5px; }

    input[type="text"] {
      background: #374151;
      border: 1px solid #4b5563;
      color: #f3f4f6;
      padding: 7px 11px;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus { border-color: #3b82f6; }
    input[type="text"]::placeholder { color: #6b7280; }

    #subject-input { width: 260px; }
    #retailer-name-input { width: 160px; }
    #retailer-addr-input { width: 200px; }

    button {
      padding: 7px 14px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .btn-blue   { background: #3b82f6; color: white; }
    .btn-blue:hover   { background: #2563eb; }
    .btn-red    { background: #ef4444; color: white; }
    .btn-red:hover    { background: #dc2626; }
    .btn-green  { background: #10b981; color: white; }
    .btn-green:hover  { background: #059669; }
    .btn-amber  { background: #f59e0b; color: white; }
    .btn-amber:hover  { background: #d97706; }
    .btn-gray   { background: #374151; color: #d1d5db; border: 1px solid #4b5563; }
    .btn-gray:hover   { background: #4b5563; }

    .sep { width: 1px; height: 30px; background: #374151; }

    /* ── Map Container ── */
    #map-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    /* ── Side Panel ── */
    #panel {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 260px;
      background: rgba(17, 24, 39, 0.92);
      backdrop-filter: blur(8px);
      border: 1px solid #374151;
      border-radius: 10px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      max-height: calc(100vh - 120px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    #panel-header {
      padding: 12px 14px;
      border-bottom: 1px solid #374151;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    #panel-header span { font-size: 13px; font-weight: 600; color: #f9fafb; }
    #retailer-count { font-size: 11px; color: #6b7280; background: #374151; padding: 2px 7px; border-radius: 10px; }

    #retailer-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px;
    }
    #retailer-list::-webkit-scrollbar { width: 4px; }
    #retailer-list::-webkit-scrollbar-track { background: transparent; }
    #retailer-list::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 2px; }

    .r-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 8px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .r-item:hover { background: #1f2937; }
    .r-item.selected { background: #1e3a5f; }

    .r-logo {
      width: 30px; height: 30px;
      border-radius: 5px;
      object-fit: contain;
      background: white;
      padding: 2px;
      flex-shrink: 0;
    }
    .r-logo-fb {
      width: 30px; height: 30px;
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }

    .r-name { font-size: 12px; color: #e5e7eb; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .r-del {
      width: 20px; height: 20px;
      background: transparent;
      border: none;
      color: #4b5563;
      cursor: pointer;
      border-radius: 4px;
      font-size: 13px;
      display: flex; align-items: center; justify-content: center;
      padding: 0;
      flex-shrink: 0;
    }
    .r-del:hover { color: #ef4444; background: rgba(239,68,68,0.1); }

    #panel-footer {
      padding: 10px 14px;
      border-top: 1px solid #374151;
    }
    .footer-label { font-size: 11px; color: #6b7280; margin-bottom: 5px; display: flex; justify-content: space-between; }
    input[type="range"] {
      width: 100%;
      accent-color: #3b82f6;
      height: 4px;
      cursor: pointer;
    }
    .footer-btns { display: flex; gap: 6px; margin-top: 8px; }
    .footer-btns button { flex: 1; font-size: 11px; padding: 6px; }

    /* ── Map overlay buttons ── */
    .map-fab {
      position: absolute;
      bottom: 30px;
      z-index: 900;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    #fab-left { left: 12px; }

    /* ── Status bar ── */
    #status-bar {
      background: #111827;
      border-top: 1px solid #1f2937;
      padding: 5px 18px;
      font-size: 11px;
      color: #6b7280;
      flex-shrink: 0;
    }
    #status-bar span.hi { color: #60a5fa; }

    /* ── Leaflet overrides ── */
    .leaflet-control-attribution { font-size: 9px !important; }
    .leaflet-control-zoom a { background: #1f2937 !important; color: #d1d5db !important; border-color: #374151 !important; }
    .leaflet-control-zoom a:hover { background: #374151 !important; }
    .leaflet-popup-content-wrapper { background: #1f2937; color: #f3f4f6; border: 1px solid #374151; border-radius: 8px; }
    .leaflet-popup-tip { background: #1f2937; }

    /* ── Loading overlay ── */
    #loading {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 2000;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: white;
      flex-direction: column;
      gap: 12px;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- Header -->
<div id="header">
  <div>
    <h1>🗺 Atlas</h1>
  </div>
  <span class="subtitle">Retailer Map Maker · Duhs Commercial</span>
  <div style="flex:1"></div>
  <button class="btn-amber" onclick="spreadLogos()" title="Arrange logos in a circle">📐 Spread</button>
  <button class="btn-green" onclick="exportMap()" title="Download as PNG">💾 Export PNG</button>
</div>

<!-- Controls -->
<div id="controls">
  <div class="ctrl-group">
    <span class="ctrl-label">Subject Property</span>
    <input type="text" id="subject-input" placeholder="1234 Main St, San Diego, CA"/>
  </div>
  <button class="btn-blue" onclick="geocodeSubject()">📍 Set Property</button>

  <div class="sep"></div>

  <div class="ctrl-group">
    <span class="ctrl-label">Retailer Name</span>
    <input type="text" id="retailer-name-input" placeholder="e.g. Starbucks"/>
  </div>
  <div class="ctrl-group">
    <span class="ctrl-label">Address (optional)</span>
    <input type="text" id="retailer-addr-input" placeholder="Leave blank to place near property"/>
  </div>
  <button class="btn-blue" onclick="addRetailer()">+ Add</button>

  <div class="sep"></div>

  <button class="btn-amber" onclick="discoverNearby()" title="Auto-discover businesses from OpenStreetMap">🔍 Discover Nearby</button>
</div>

<!-- Map -->
<div id="map-wrap">
  <div id="loading">
    <div class="spinner"></div>
    <span id="loading-msg">Loading...</span>
  </div>

  <div id="map"></div>

  <!-- Side panel -->
  <div id="panel">
    <div id="panel-header">
      <span>Retailers on Map</span>
      <span id="retailer-count">0</span>
    </div>
    <div id="retailer-list">
      <div style="color:#4b5563;font-size:12px;text-align:center;padding:20px 14px;">
        Add retailers using the bar above, or click "Discover Nearby" after setting a property.
      </div>
    </div>
    <div id="panel-footer">
      <div class="footer-label">
        <span>Logo Size</span>
        <span id="size-val">48px</span>
      </div>
      <input type="range" id="size-slider" min="24" max="96" value="48" oninput="bulkResize(this.value)"/>
      <div class="footer-btns">
        <button class="btn-gray" onclick="clearAll()">🗑 Clear All</button>
        <button class="btn-gray" onclick="toggleLabels()">🏷 Labels: <span id="lbl-state">ON</span></button>
      </div>
    </div>
  </div>
</div>

<!-- Status -->
<div id="status-bar">
  <span id="status">Enter a subject property address and click <span class="hi">Set Property</span> to begin.</span>
</div>

<script>
// ════════════════════════════════════════════

// ════════════════════════════════════════════
const DOMAINS = {

  'ross': 'rossstores.com', 'tj maxx': 'tjmaxx.tjx.com',
  'marshalls': 'marshalls.com', 'old navy': 'oldnavy.com',
  'gap': 'gap.com', 'h&m': 'hm.com', 'zara': 'zara.com',
  'bath & body works': 'bathandbodyworks.com',
  "victoria's secret": 'victoriassecret.com',
  'american eagle': 'ae.com', 'foot locker': 'footlocker.com',
  'nike': 'nike.com', 'adidas': 'adidas.com',
  'ulta': 'ulta.com', 'sephora': 'sephora.com',
  'best buy': 'bestbuy.com', 'apple': 'apple.com',
  'gamestop': 'gamestop.com', 'petco': 'petco.com',
  'petsmart': 'petsmart.com', 'autozone': 'autozone.com',
  "o'reilly auto parts": 'oreillyauto.com',
  'chase bank': 'chase.com', 'chase': 'chase.com',
  'wells fargo': 'wellsfargo.com', 'bank of america': 'bankofamerica.com',
  'us bank': 'usbank.com', 'td bank': 'td.com',
  'in-n-out': 'in-n-out.com', 'in n out': 'in-n-out.com',
  'del taco': 'deltaco.com', 'jack in the box': 'jackinthebox.com',
  'panda express': 'pandaexpress.com',
  'panera': 'panerabread.com', 'panera bread': 'panerabread.com',
  "dunkin'": 'dunkindonuts.com', 'dunkin': 'dunkindonuts.com',
  'pizza hut': 'pizzahut.com',
  "domino's": 'dominos.com', 'dominos': 'dominos.com',
  'little caesars': 'littlecaesars.com',
  'kfc': 'kfc.com', 'popeyes': 'popeyes.com',
  'wingstop': 'wingstop.com', "raising cane's": 'raisingcanes.com',
  'sonic': 'sonicdrivein.com', 'dairy queen': 'dairyqueen.com',
  'cold stone': 'coldstonecreamery.com', 'baskin robbins': 'baskinrobbins.com',
  'smoothie king': 'smoothieking.com', "jersey mike's": 'jerseymikes.com',
  "jimmy john's": 'jimmyjohns.com', 'firehouse subs': 'firehousesubs.com',
  'shake shack': 'shakeshack.com', 'five guys': 'fiveguys.com',
  "denny's": 'dennys.com', 'ihop': 'ihop.com',
  "applebee's": 'applebees.com', "chili's": 'chilis.com',
  'olive garden': 'olivegarden.com', 'red lobster': 'redlobster.com',
  'outback steakhouse': 'outback.com', 'buffalo wild wings': 'buffalowildwings.com',
  'texas roadhouse': 'texasroadhouse.com',
  '7-eleven': '7-eleven.com', '7 eleven': '7-eleven.com',
  'circle k': 'circlek.com', 'chevron': 'chevron.com',
  'shell': 'shell.com', 'arco': 'arco.com',
  'planet fitness': 'planetfitness.com', 'la fitness': 'lafitness.com',
  'orangetheory': 'orangetheory.com', 'anytime fitness': 'anytimefitness.com',
  'crunch fitness': 'crunch.com',
  'sprouts': 'sprouts.com', 'vons': 'vons.com',
  'ralphs': 'ralphs.com', 'food 4 less': 'food4less.com',
  'smart & final': 'smartandfinal.com', 'winco': 'wincofoods.com',
  'h mart': 'hmart.com', 'hobby lobby': 'hobbylobby.com',
  'michaels': 'michaels.com', 'big lots': 'biglots.com',
  'nordstrom rack': 'nordstromrack.com', 'nordstrom': 'nordstrom.com',
  "macy's": 'macys.com', 'jcpenney': 'jcpenney.com',
  "kohl's": 'kohls.com', "dick's sporting goods": 'dickssportinggoods.com',
  'rei': 'rei.com', 'academy sports': 'academy.com',
  'office depot': 'officedepot.com', 'staples': 'staples.com',
  'fedex': 'fedex.com', 'ups store': 'theupsstore.com',
  'post office': 'usps.com', 'usps': 'usps.com',
};

const BRAND_COLORS = [
  '#3b82f6','#ef4444','#10b981','#f59e0b','#8b5cf6',
  '#ec4899','#06b6d4','#84cc16','#f97316','#6366f1',
  '#14b8a6','#e11d48','#2563eb','#d97706','#7c3aed'
];

// ════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════
let map, subjectMarker = null, subjectLatLng = null;
let retailers = [];
let selectedId = null;
let colorIdx = 0;
let globalSize = 48;
let showLabels = true;

// ════════════════════════════════════════════
// MAP INIT
// ════════════════════════════════════════════
function initMap() {
  map = L.map('map', {
    center: [32.7157, -117.1611],
    zoom: 16,
    zoomControl: true,
  });

  // Satellite tiles (ESRI World Imagery — free, no key)
  L.tileLayer(
    'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
    { attribution: '© Esri, Maxar, Earthstar Geographics', maxZoom: 19 }
  ).addTo(map);

  // Street name labels overlay
  L.tileLayer(
    'https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Transportation/MapServer/tile/{z}/{y}/{x}',
    { maxZoom: 19, opacity: 0.6 }
  ).addTo(map);

  setStatus('Ready. Enter a subject property address and click <span class="hi">Set Property</span>.');
}

// ════════════════════════════════════════════
// GEOCODING  (Nominatim — free, no key)
// ════════════════════════════════════════════
async function geocode(address) {
  const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(address)}&format=json&limit=1&countrycodes=us`;
  const res = await fetch(url, { headers: { 'Accept-Language': 'en', 'User-Agent': 'RetailerMapMaker/1.0' } });
  const data = await res.json();
  if (data.length) return { lat: +data[0].lat, lng: +data[0].lon, display: data[0].display_name };
  return null;
}

async function geocodeSubject() {
  const addr = document.getElementById('subject-input').value.trim();
  if (!addr) { alert('Enter an address.'); return; }
  showLoading('Locating property…');
  const coords = await geocode(addr);
  hideLoading();
  if (!coords) { setStatus('Address not found. Try a more specific address.'); return; }
  subjectLatLng = coords;
  if (subjectMarker) subjectMarker.remove();

  const icon = L.divIcon({
    html: `<div style="
      position:relative;
      width:38px;height:38px;
      display:flex;align-items:center;justify-content:center;">
      <div style="
        background:#ef4444;
        border:3px solid white;
        border-radius:50% 50% 50% 0;
        transform:rotate(-45deg);
        width:32px;height:32px;
        box-shadow:0 3px 14px rgba(0,0,0,0.5);">
      </div>
      <div style="position:absolute;font-size:15px;margin-bottom:4px;">⭐</div>
    </div>`,
    iconSize: [38, 38], iconAnchor: [19, 38], className: ''
  });

  subjectMarker = L.marker([coords.lat, coords.lng], { icon })
    .addTo(map)
    .bindPopup(`<strong style="color:#f3f4f6">Subject Property</strong><br><span style="color:#9ca3af;font-size:11px">${addr}</span>`);

  map.flyTo([coords.lat, coords.lng], 16, { duration: 1.5 });
  setStatus(`Subject set: <span class="hi">${addr}</span>. Now add retailers or click Discover Nearby.`);
}

// ════════════════════════════════════════════
// LOGO UTILITIES
// ════════════════════════════════════════════
function getDomain(name) {
  const k = name.toLowerCase().trim();
  if (DOMAINS[k]) return DOMAINS[k];
  // Try partial match
  for (const [key, domain] of Object.entries(DOMAINS)) {
    if (k.includes(key) || key.includes(k)) return domain;
  }
  return null;
}

function getLogoUrl(name) {
  const domain = getDomain(name) || name.toLowerCase().replace(/[^a-z0-9]/g, '') + '.com';
  return `https://logo.clearbit.com/${domain}?size=128`;
}

function getInitials(name) {
  return name.split(/\s+/).slice(0, 2).map(w => w[0]).join('').toUpperCase();
}

function nextColor() {
  return BRAND_COLORS[(colorIdx++) % BRAND_COLORS.length];
}

// ════════════════════════════════════════════
// ADD RETAILER
// ════════════════════════════════════════════
async function addRetailer(name, address, coordsOverride) {
  if (!name) {
    name = document.getElementById('retailer-name-input').value.trim();
    address = document.getElementById('retailer-addr-input').value.trim();
  }
  if (!name) { alert('Enter a retailer name.'); return; }
  if (!subjectLatLng) { alert('Set a subject property first.'); return; }

  let coords = coordsOverride;
  if (!coords) {
    if (address) {
      showLoading(`Geocoding ${name}…`);
      coords = await geocode(address);
      hideLoading();
      if (!coords) coords = nearbyCoords();
    } else {
      coords = nearbyCoords();
    }
  }

  const id = 'r' + Date.now() + Math.random().toString(36).slice(2,6);
  const color = nextColor();
  const logoUrl = getLogoUrl(name);

  const r = { id, name, coords, color, logoUrl, loaded: false, size: globalSize, marker: null };
  retailers.push(r);
  await placeMarker(r);
  renderList();

  document.getElementById('retailer-name-input').value = '';
  document.getElementById('retailer-addr-input').value = '';
  setStatus(`Added <span class="hi">${name}</span>. Drag on map to reposition.`);
}

function nearbyCoords() {
  const n = retailers.length;
  const a = (n * 137.508) * Math.PI / 180; // golden angle spiral
  const d = 0.0008 + Math.floor(n / 10) * 0.0006;
  return {
    lat: subjectLatLng.lat + d * Math.sin(a),
    lng: subjectLatLng.lng + d * Math.cos(a) * 1.25
  };
}

// ════════════════════════════════════════════
// PLACE MARKER
// ════════════════════════════════════════════
async function placeMarker(r) {
  if (r.marker) r.marker.remove();

  // Pre-check if logo loads
  await new Promise(resolve => {
    const img = new Image();
    img.onload  = () => { r.loaded = true;  resolve(); };
    img.onerror = () => { r.loaded = false; resolve(); };
    img.src = r.logoUrl;
    setTimeout(resolve, 3000); // timeout
  });

  const icon = buildIcon(r);
  const marker = L.marker([r.coords.lat, r.coords.lng], { icon, draggable: true, autoPan: true }).addTo(map);

  marker.on('dragend', e => {
    const p = e.target.getLatLng();
    r.coords = { lat: p.lat, lng: p.lng };
  });
  marker.on('click', () => selectRetailer(r.id));

  r.marker = marker;
}

function buildIcon(r) {
  const s = r.size || globalSize;
  const selected = selectedId === r.id;
  const border = selected ? '2.5px solid #3b82f6' : '2px solid rgba(255,255,255,0.9)';
  const glow   = selected ? '0 0 0 3px rgba(59,130,246,0.5), 0 4px 16px rgba(0,0,0,0.5)' : '0 2px 10px rgba(0,0,0,0.45)';

  const inner = r.loaded
    ? `<img src="${r.logoUrl}" style="width:${s}px;height:${s}px;object-fit:contain;display:block;"/>`
    : `<div style="width:${s}px;height:${s}px;background:${r.color};display:flex;align-items:center;justify-content:center;font-size:${Math.floor(s*0.32)}px;font-weight:800;color:white;">${getInitials(r.name)}</div>`;

  const label = showLabels
    ? `<div style="font-size:${Math.max(8,Math.floor(s*0.19))}px;font-weight:700;color:#111;padding:2px 4px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:${s+6}px;">${r.name}</div>`
    : '';

  const html = `<div style="background:white;border:${border};border-radius:7px;padding:3px;cursor:move;box-shadow:${glow};user-select:none;">
    ${inner}${label}
  </div>`;

  return L.divIcon({
    html,
    iconSize: [s + 10, s + (showLabels ? 26 : 10)],
    iconAnchor: [(s + 10) / 2, s + (showLabels ? 26 : 10)],
    className: ''
  });
}

function refreshMarker(r) {
  if (r.marker) r.marker.setIcon(buildIcon(r));
}

// ════════════════════════════════════════════
// AUTO-DISCOVER (OpenStreetMap Overpass API)
// ════════════════════════════════════════════
async function discoverNearby() {
  if (!subjectLatLng) { alert('Set a subject property first.'); return; }
  showLoading('Discovering nearby businesses…');

  const { lat, lng } = subjectLatLng;
  const radius = 500; // meters

  const query = `[out:json][timeout:20];
(
  node["brand"](around:${radius},${lat},${lng});
  node["name"]["shop"~"supermarket|convenience|department_store|clothing|shoes|electronics|drugstore|hardware"](around:${radius},${lat},${lng});
  node["name"]["amenity"~"restaurant|cafe|fast_food|bank|pharmacy"](around:${radius},${lat},${lng});
);
out body;`;

  try {
    const res = await fetch('https://overpass-api.de/api/interpreter', {
      method: 'POST',
      body: 'data=' + encodeURIComponent(query)
    });
    const data = await res.json();
    hideLoading();

    const seen = new Set(retailers.map(r => r.name.toLowerCase()));
    const added = [];

    for (const el of data.elements) {
      const name = el.tags?.brand || el.tags?.name;
      if (!name || seen.has(name.toLowerCase())) continue;
      seen.add(name.toLowerCase());
      added.push({ name, coords: { lat: el.lat, lng: el.lon } });
    }

    if (added.length === 0) {
      setStatus('No new businesses found nearby via OpenStreetMap. Try adding manually.');
      return;
    }

    for (const { name, coords } of added.slice(0, 30)) {
      await addRetailer(name, null, coords);
    }

    setStatus(`Discovered <span class="hi">${added.length}</span> nearby businesses. Drag logos to reposition.`);
  } catch (e) {
    hideLoading();
    setStatus('Discover failed. Check your connection and try again.');
  }
}

// ════════════════════════════════════════════
// PANEL / LIST
// ════════════════════════════════════════════
function renderList() {
  const list = document.getElementById('retailer-list');
  document.getElementById('retailer-count').textContent = retailers.length;

  if (retailers.length === 0) {
    list.innerHTML = `<div style="color:#4b5563;font-size:12px;text-align:center;padding:20px 14px;">No retailers added yet.</div>`;
    return;
  }

  list.innerHTML = '';
  retailers.forEach(r => {
    const div = document.createElement('div');
    div.className = `r-item${selectedId === r.id ? ' selected' : ''}`;
    div.onclick = () => selectRetailer(r.id);

    const logo = r.loaded
      ? `<img src="${r.logoUrl}" class="r-logo" onerror="this.style.display='none'"/>`
      : `<div class="r-logo-fb" style="background:${r.color};">${getInitials(r.name)}</div>`;

    div.innerHTML = `${logo}<span class="r-name" title="${r.name}">${r.name}</span>
      <button class="r-del" title="Remove" onclick="event.stopPropagation();removeRetailer('${r.id}')">✕</button>`;
    list.appendChild(div);
  });
}

function selectRetailer(id) {
  selectedId = selectedId === id ? null : id;
  retailers.forEach(r => refreshMarker(r));
  renderList();
  const r = retailers.find(x => x.id === id);
  if (r && selectedId) {
    map.panTo([r.coords.lat, r.coords.lng]);
    setStatus(`Selected: <span class="hi">${r.name}</span>. Drag on map to reposition.`);
  }
}

function removeRetailer(id) {
  const r = retailers.find(x => x.id === id);
  if (r && r.marker) r.marker.remove();
  retailers = retailers.filter(x => x.id !== id);
  if (selectedId === id) selectedId = null;
  renderList();
  setStatus('Retailer removed.');
}

// ════════════════════════════════════════════
// BULK RESIZE
// ════════════════════════════════════════════
function bulkResize(val) {
  globalSize = +val;
  document.getElementById('size-val').textContent = val + 'px';
  retailers.forEach(r => { r.size = globalSize; refreshMarker(r); });
}

// ════════════════════════════════════════════
// SPREAD LOGOS
// ════════════════════════════════════════════
function spreadLogos() {
  if (!subjectLatLng || retailers.length === 0) return;
  const n = retailers.length;
  const baseR = 0.0012;
  retailers.forEach((r, i) => {
    const rings = Math.ceil(n / 12);
    const ring = Math.floor(i / 12);
    const posInRing = i % 12;
    const countInRing = Math.min(12, n - ring * 12);
    const angle = (posInRing / countInRing) * 2 * Math.PI;
    const radius = baseR * (ring + 1);
    r.coords = {
      lat: subjectLatLng.lat + radius * Math.sin(angle),
      lng: subjectLatLng.lng + radius * Math.cos(angle) * 1.4
    };
    if (r.marker) r.marker.setLatLng([r.coords.lat, r.coords.lng]);
  });
  setStatus('Logos spread out around the subject property.');
}

// ════════════════════════════════════════════
// TOGGLE LABELS
// ════════════════════════════════════════════
function toggleLabels() {
  showLabels = !showLabels;
  document.getElementById('lbl-state').textContent = showLabels ? 'ON' : 'OFF';
  retailers.forEach(r => refreshMarker(r));
}

// ════════════════════════════════════════════
// EXPORT
// ════════════════════════════════════════════
async function exportMap() {
  showLoading('Capturing map…');
  try {
    const canvas = await html2canvas(document.getElementById('map'), {
      useCORS: true, allowTaint: true, scale: 2, logging: false, backgroundColor: '#000'
    });
    const link = document.createElement('a');
    link.download = `retailer-map-${new Date().toISOString().slice(0,10)}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
    hideLoading();
    setStatus('Map exported to PNG.');
  } catch(e) {
    hideLoading();
    setStatus('Export failed (tile CORS). Use Cmd+Shift+4 to screenshot instead.');
  }
}

// ════════════════════════════════════════════
// CLEAR ALL
// ════════════════════════════════════════════
function clearAll() {
  if (!confirm('Remove all retailers from map?')) return;
  retailers.forEach(r => r.marker?.remove());
  retailers = []; selectedId = null; colorIdx = 0;
  renderList();
  setStatus('All retailers cleared.');
}

// ════════════════════════════════════════════
// LOADING OVERLAY
// ════════════════════════════════════════════
function showLoading(msg) {
  document.getElementById('loading-msg').textContent = msg;
  document.getElementById('loading').style.display = 'flex';
}
function hideLoading() {
  document.getElementById('loading').style.display = 'none';
}

// ════════════════════════════════════════════
// STATUS
// ════════════════════════════════════════════
function setStatus(html) {
  document.getElementById('status').innerHTML = html;
}

// ════════════════════════════════════════════
// KEYBOARD SHORTCUTS
// ════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if ((e.key === 'Delete' || e.key === 'Backspace') && selectedId && document.activeElement.tagName !== 'INPUT')
    removeRetailer(selectedId);
  if (e.key === 'Escape') {
    selectedId = null;
    retailers.forEach(r => refreshMarker(r));
    renderList();
  }
});

document.getElementById('subject-input').addEventListener('keydown', e => { if (e.key === 'Enter') geocodeSubject(); });
document.getElementById('retailer-name-input').addEventListener('keydown', e => { if (e.key === 'Enter') addRetailer(); });

// ════════════════════════════════════════════
// BOOT
// ════════════════════════════════════════════
initMap();
</script>
